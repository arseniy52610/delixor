        }

            const [selectedPlan, setSelectedPlan] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const plans = [
                { id: 'month', name: 'Месяц', price: '199 ₽', duration: '30 дней', popular: false },
                { id: 'quarter', name: '3 месяца', price: '399 ₽', duration: '90 дней', popular: true },
                { id: 'year', name: 'Год', price: '599 ₽', duration: '365 дней', popular: false }
            ];
            
            const handlePay = async () => {
                if (!selectedPlan) {
                    setError('Выберите тариф');
                    return;
                }
                
                setIsLoading(true);
                setError(null);
                
                try {
                    const response = await api.payment.create(selectedPlan);
                    
                    if (response.success && response.payment_url) {
                        // Открываем ссылку на оплату
                        window.open(response.payment_url, '_blank');
                        
                        // Закрываем мини-апп
                        setTimeout(() => {
                            if (window.Telegram && window.Telegram.WebApp) {
                                window.Telegram.WebApp.close();
